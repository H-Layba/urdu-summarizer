name: Summarizer Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install transformers torch sentencepiece pytest
      - name: Run summarization tests
        run: pytest tests/test_summarizer.py -v
